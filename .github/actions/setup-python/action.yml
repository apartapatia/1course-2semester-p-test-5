name: Setup Python with uv

inputs:
  python-version:
    description: Python version
    required: false
    default: "3.12"
  browser:
    description: Playwright browser to install
    required: false
    default: chromium

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Python ${{ inputs.python-version }}
      run: uv python install ${{ inputs.python-version }}
      shell: bash

    - name: Install dependencies
      run: uv sync
      shell: bash

    - name: Install Playwright ${{ inputs.browser }}
      run: uv run playwright install ${{ inputs.browser }} --with-deps
      shell: bash
